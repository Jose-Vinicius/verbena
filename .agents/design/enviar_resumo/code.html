<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obsidian - Generate Questions</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#a1a1aa",
                        "on-surface": "#fafafa",
                        "surface": "#0c0c0f",
                        "on-primary-fixed-variant": "#5b21b6",
                        "inverse-primary": "#5b21b6",
                        "primary-fixed-dim": "#c4b5fd",
                        "on-secondary-container": "#a1a1aa",
                        "tertiary-container": "#065f46",
                        "primary-container": "#7c3aed",
                        "tertiary": "#34d399",
                        "surface-container-highest": "#1e1e22",
                        "error-container": "#3b1111",
                        "surface-container-low": "#0f0f12",
                        "surface-container": "#121215",
                        "on-tertiary-fixed-variant": "#047857",
                        "on-error": "#1a0000",
                        "tertiary-fixed": "#bbf7d0",
                        "surface-tint": "#a78bfa",
                        "surface-bright": "#18181b",
                        "surface-container-lowest": "#09090b",
                        "surface-container-high": "#18181b",
                        "on-tertiary": "#001a12",
                        "primary": "#a78bfa",
                        "on-secondary-fixed": "#18181b",
                        "tertiary-fixed-dim": "#6ee7b7",
                        "background": "#09090b",
                        "surface-variant": "#18181b",
                        "surface-dim": "#0c0c0f",
                        "on-secondary": "#09090b",
                        "error": "#ef4444",
                        "secondary-fixed-dim": "#71717a",
                        "secondary-container": "#27272a",
                        "on-tertiary-fixed": "#003318",
                        "secondary": "#71717a",
                        "outline": "#52525b",
                        "on-surface-variant": "#a1a1aa",
                        "inverse-surface": "#fafafa",
                        "primary-fixed": "#ede9fe",
                        "outline-variant": "#27272a",
                        "on-primary": "#0a0012",
                        "on-secondary-fixed-variant": "#3f3f46",
                        "on-background": "#fafafa",
                        "on-tertiary-container": "#bbf7d0",
                        "on-error-container": "#fca5a5",
                        "on-primary-container": "#ede9fe",
                        "on-primary-fixed": "#2e1065",
                        "inverse-on-surface": "#09090b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Geist", "sans-serif"],
                        "display": ["Geist", "sans-serif"],
                        "body": ["Geist", "sans-serif"],
                        "label": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-full flex overflow-hidden">
<!-- SideNavBar -->
<nav class="h-screen w-64 border-r border-outline-variant bg-surface flex flex-col py-6 px-4 shrink-0 font-body">
<!-- Header -->
<div class="flex items-center gap-3 mb-8 px-2">
<div class="h-10 w-10 rounded-lg bg-surface-container-high border border-outline-variant flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary">auto_awesome</span>
</div>
<div>
<h1 class="text-xl font-headline font-black tracking-tighter text-on-surface">Obsidian</h1>
<p class="text-xs text-on-surface-variant">Study Platform</p>
</div>
</div>
<!-- Navigation Links -->
<div class="flex-1 flex flex-col gap-1">
<!-- Dashboard (Inactive) -->
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:text-on-surface transition-colors">dashboard</span>
<span class="font-medium text-sm">Dashboard</span>
</a>
<!-- Study (Active) -->
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary font-bold bg-surface-container-high opacity-80 transition-all" href="#">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">menu_book</span>
<span class="text-sm">Study</span>
</a>
<!-- History (Inactive) -->
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:text-on-surface transition-colors">history</span>
<span class="font-medium text-sm">History</span>
</a>
<!-- Settings (Inactive) -->
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:text-on-surface transition-colors">settings</span>
<span class="font-medium text-sm">Settings</span>
</a>
</div>
<!-- User Profile Avatar (Bottom) -->
<div class="mt-auto pt-6 border-t border-outline-variant px-2">
<div class="flex items-center gap-3">
<img alt="User profile" class="h-8 w-8 rounded-full border border-outline-variant object-cover" data-alt="A close up portrait photo of a young professional in a dark studio setting. Moody, high-contrast lighting with a subtle violet rim light. Modern, minimalist aesthetic reflecting a developer or tech user." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCdyN6Gg62-b3VZcJeE2OgDV1A1HGRFF8HGQjTCSv8c0KVrhDjt55CstQS3XIMYJqRXulY0O9KpAjSspHoYbo-84uLRb4D1iISNZ878phdt5B9s1GcpC1Q2Lu-paecaSC0zNJKE8sBcmJ1u0oj-T_tjLMteVretO7YK6WhdhPs4Gpu24htSjtf1f-6YIa_q6dFEwQvg9dHrf2aCq3mjN1kECUKXTOx03IfRp7z2NiW5gSSwSu4097-O3UyfXa9sW_BBhl37EvPm-BU"/>
<div class="flex flex-col">
<span class="text-sm font-medium text-on-surface">J. Doe</span>
<span class="text-xs text-on-surface-variant">Pro Plan</span>
</div>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col overflow-y-auto relative">
<!-- Minimalist Form Container -->
<div class="max-w-3xl w-full mx-auto px-8 py-16 flex-1 flex flex-col justify-center">
<header class="mb-10">
<h2 class="text-3xl font-headline font-bold tracking-tight text-on-surface mb-2">Generate Questions</h2>
<p class="text-on-surface-variant text-sm">Paste your raw text or summary below to generate an interactive study set.</p>
</header>
<form class="flex flex-col gap-8">
<!-- 1. Textarea -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-sm font-medium text-on-surface" for="summary_content">Source Material</label>
<span class="text-xs text-on-surface-variant">Max 5000 chars</span>
</div>
<textarea class="w-full bg-surface-container border border-outline-variant rounded-lg p-4 text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-y font-body text-sm leading-relaxed" id="summary_content" name="summary_content" placeholder="Paste your notes, article, or summary here..." rows="10"></textarea>
</div>
<!-- 2. Dropdown (Subject) & 3. Question Count Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Subject Selection -->
<div class="space-y-2 flex flex-col">
<label class="text-sm font-medium text-on-surface" for="subject">Subject</label>
<div class="relative flex-1">
<select class="w-full h-full min-h-[48px] bg-surface-container border border-outline-variant rounded-lg pl-4 pr-10 text-sm text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="subject" name="subject">
<option disabled="" selected="" value="">Select or create new...</option>
<option value="biology">Biology 101</option>
<option value="history">World History</option>
<option value="cs">Computer Science</option>
<option value="new">+ Create New Subject</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-xl">expand_more</span>
</div>
</div>
</div>
<!-- Question Count Pills -->
<div class="space-y-2">
<label class="text-sm font-medium text-on-surface">Question Count</label>
<div class="flex gap-3 h-[48px]">
<!-- Pill 10 -->
<label class="relative flex-1 cursor-pointer group">
<input checked="" class="peer sr-only" name="question_count" type="radio" value="10"/>
<div class="w-full h-full flex items-center justify-center rounded-lg border border-outline-variant bg-surface-container text-on-surface-variant text-sm font-medium transition-all group-hover:border-outline peer-checked:bg-primary-fixed-dim/10 peer-checked:border-primary peer-checked:text-primary">
                                    10
                                </div>
</label>
<!-- Pill 20 -->
<label class="relative flex-1 cursor-pointer group">
<input class="peer sr-only" name="question_count" type="radio" value="20"/>
<div class="w-full h-full flex items-center justify-center rounded-lg border border-outline-variant bg-surface-container text-on-surface-variant text-sm font-medium transition-all group-hover:border-outline peer-checked:bg-primary-fixed-dim/10 peer-checked:border-primary peer-checked:text-primary">
                                    20
                                </div>
</label>
<!-- Pill 30 -->
<label class="relative flex-1 cursor-pointer group">
<input class="peer sr-only" name="question_count" type="radio" value="30"/>
<div class="w-full h-full flex items-center justify-center rounded-lg border border-outline-variant bg-surface-container text-on-surface-variant text-sm font-medium transition-all group-hover:border-outline peer-checked:bg-primary-fixed-dim/10 peer-checked:border-primary peer-checked:text-primary">
                                    30
                                </div>
</label>
</div>
</div>
</div>
<!-- 4. Submit CTA -->
<div class="pt-6 border-t border-outline-variant mt-2">
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary py-4 rounded-lg font-bold text-lg transition-colors duration-200 flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(167,139,250,0.15)]" type="button">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
                        Generate Questions
                    </button>
</div>
</form>
</div>
</main>
</body></html>
