<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant flex justify-between" for="subject">
<span>Subject Domain</span>

<script>
        // Simple micro-interaction for the number input to simulate dynamic validation check
        const questionInput = document.getElementById('questions');
        const subjectSelect = document.getElementById('subject');
        
        subjectSelect.addEventListener('change', (e) => {
            // In a real app, this would fetch the available pool count
            const parent = questionInput.parentElement;
            const validationTag = parent.querySelector('.text-tertiary');
            
            // Brief loading flash
            validationTag.style.opacity = '0.5';
            setTimeout(() => {
                validationTag.style.opacity = '1';
                // Randomize available just for UI demo feel
                const counts = [15, 42, 8, 120];
                const rand = counts[Math.floor(Math.random() * counts.length)];
                validationTag.innerHTML = `<span class="material-symbols-outlined text-[14px]">check_circle</span> ${rand} available`;
            }, 300);
        });
    </script>
