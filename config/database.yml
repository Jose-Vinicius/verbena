default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["POSTGRES_USER"] %>
  password: <%= ENV["POSTGRES_PASSWORD"] %>
  host: localhost
  port: <%= ENV["POSTGRES_PORT"] %>
development:
  primary:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>
  cache:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_cable
    migrations_paths: db/cable_migrate
test:
  primary:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_test
  cache:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_cache_test
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_queue_test
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV["POSTGRES_DB"] %>_cable_test
    migrations_paths: db/cable_migrate
production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>_production_cacher
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>_production_cable
    migrations_paths: db/cable_migrate
